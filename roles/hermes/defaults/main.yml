---

  # ---- service identity ----
  hermes_user: hermes
  hermes_group: hermes
  # Unit name generated by "hermes gateway install --system".
  hermes_service_name: hermes-gateway

  # ---- installation ----
  # OS packages the installer expects to find. It pulls python, node, ripgrep
  # and ffmpeg itself, but not these.
  hermes_packages:
    - git
    - curl
    - xz-utils
    - build-essential
  # The installer has no version pinning, updates are done with "hermes update".
  hermes_installer_url: https://hermes-agent.nousresearch.com/install.sh
  # Locations the installer uses when it runs as root.
  hermes_bin: /usr/local/bin/hermes
  hermes_code_dir: /usr/local/lib/hermes-agent
  # Operator wrapper that runs the CLI as the service user against its managed
  # state, so a sudo-capable login does not need to know user, HERMES_HOME and
  # the fact that both directories are unreadable to it. Set to "" to skip it.
  hermes_ctl_bin: /usr/local/bin/hermesctl

  # ---- directories ----
  # Managed scope: administrator owned policy, not writable by the agent.
  hermes_config_dir: /etc/hermes
  # HERMES_HOME, the writable state directory: config.yaml, .env, memories,
  # skills, sessions and logs the agent creates while it runs.
  hermes_home: /var/lib/hermes

  # ---- managed configuration ----
  # Pinned keys of the managed config.yaml, empty means nothing is pinned.
  hermes_managed_config: {}
  # Plain values of the managed .env, e.g. {SIGNAL_HTTP_URL: "http://127.0.0.1:8080"}.
  hermes_managed_env: {}
  # Secret values of the managed .env: environment variable -> password store
  # entry, e.g. {ANTHROPIC_API_KEY: "private/ai/anthropic"}.
  hermes_managed_env_secrets: {}

  # ---- service hardening ----
  hermes_service_hardening: true
  # Additional writable paths for the agent, it can only write to its state
  # directory otherwise.
  hermes_service_read_write_paths: []
