---

 - name: install the signal-cli systemd unit
   become: yes
   ansible.builtin.template:
    src: signal-cli.service.j2
    dest: "/etc/systemd/system/{{ signal_cli_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
   notify: restart signal-cli

 - name: enable the signal-cli service at boot time
   become: yes
   ansible.builtin.systemd_service:
    name: "{{ signal_cli_service_name }}"
    daemon_reload: yes
    enabled: yes

 - name: check whether a local account exists
   become: yes
   ansible.builtin.stat:
    path: "{{ signal_cli_data_dir }}/data/accounts.json"
   register: signal_cli_registry_state

 # Without an account the daemon cannot serve and would crash loop, so it is
 # only started once an account has been restored or registered.
 - name: start the signal-cli daemon
   become: yes
   ansible.builtin.systemd_service:
    name: "{{ signal_cli_service_name }}"
    state: started
   when: signal_cli_registry_state.stat.exists

 - name: report the missing account
   ansible.builtin.debug:
    msg: >-
      No signal account in {{ signal_cli_data_dir }}/data. {{ signal_cli_service_name }}
      is enabled but not started. Register or link an account first, then run
      this role again.
   when: not signal_cli_registry_state.stat.exists
